set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g detach-on-destroy off
setw -g mode-keys vi
set -s set-clipboard off

# keybindings
set -g prefix2 C-s
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
unbind r
bind r source-file ~/.config/tmux/tmux.conf
bind q choose-tree -Zs
bind s split-window -v
bind v split-window -h
unbind l
bind l next-window
bind h previous-window

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/bin/tmux-plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'xamut/tmux-weather'

set-option -g @tmux-weather-location "12553"
set-option -g @tmux-weather-units "u"
set-option -g @tmux-weather-format "%c%t"

set -g @sessionx-bind 'o'
set -g @sessionx-prompt " "
set -g @sessionx-pointer " "
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-filter-current 'false'

source ~/.config/tmux/catppuccin.conf

run -b '~/bin/tmux-plugins/tpm/tpm'

